name: PitCrew
options:
  bundleIdPrefix: com.pitcrew
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ""

targets:
  PitCrew:
    type: application
    platform: iOS
    sources:
      - path: Sources/PitCrew
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pitcrew.app
        PRODUCT_NAME: PitCrew
        INFOPLIST_FILE: Sources/PitCrew/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: "YES"
        SUPPORTS_MACCATALYST: "NO"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  PitCrewTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/PitCrewTests
    dependencies:
      - target: PitCrew
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pitcrew.app.tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  PitCrew:
    build:
      targets:
        PitCrew: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PitCrewTests
    archive:
      config: Release
